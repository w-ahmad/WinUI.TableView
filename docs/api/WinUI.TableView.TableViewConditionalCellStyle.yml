  namespace: WinUI.TableView
  summary: Represents a conditional style for a table view cell that is applied when a specified predicate evaluates to true.
  remarks: >-
    Use this class to define styles that are conditionally applied to cells in a table view based on
        custom logic. The style is only applied to cells for which the predicate returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>. Multiple
        conditional styles can be used to support complex styling scenarios.
  example: []
  syntax:
    content: >-
      [ContentProperty(Name = "Style")]

      [StyleTypedProperty(Property = "Style", StyleTargetType = typeof(TableViewCell))]

      public class TableViewConditionalCellStyle : DependencyObject, IWinRTObject
    content.vb: >-
      <ContentProperty(Name:="Style")>

      <StyleTypedProperty(Property:="Style", StyleTargetType:=GetType(TableViewCell))>

      Public Class TableViewConditionalCellStyle Inherits DependencyObject Implements IWinRTObject

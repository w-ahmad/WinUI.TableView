  assemblies:
  - WinUI.TableView
  namespace: WinUI.TableView
  summary: Represents a collection of columns in a <xref href="WinUI.TableView.TableView" data-throw-if-not-resolved="false"></xref>, providing functionality to manage and interact with the columns.
  remarks: >-
    This interface extends <xref href="System.Collections.Generic.IList%601" data-throw-if-not-resolved="false"></xref> to provide standard list operations for <xref href="WinUI.TableView.TableViewColumn" data-throw-if-not-resolved="false"></xref> objects. It also implements <xref href="System.Collections.Specialized.INotifyCollectionChanged" data-throw-if-not-resolved="false"></xref> to notify subscribers of
        changes to the collection, such as additions or removals.
  example: []
  syntax:
    content: public interface ITableViewColumnsCollection
    content.vb: Public Interface ITableViewColumnsCollection
  derivedClasses:

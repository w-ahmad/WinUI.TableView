  type: Property
  source:
    id: VisibleColumns
    path: E:\copilot-worktrees\WinUI.TableView\w-ahmad-curly-disco\src\ITableViewColumnsCollection.cs
    startLine: 38
  assemblies:
  - WinUI.TableView
  namespace: WinUI.TableView
  summary: Gets the list of visible <xref href="WinUI.TableView.TableViewColumn" data-throw-if-not-resolved="false"></xref>s.
  remarks: >-
    The result is a list of columns that are currently visible in the table view, meaning their <xref href="WinUI.TableView.TableViewColumn.Visibility" data-throw-if-not-resolved="false"></xref> is set to <xref href="Microsoft.UI.Xaml.Visibility.Visible" data-throw-if-not-resolved="false"></xref>.

    The result is also ordered by the <xref href="WinUI.TableView.TableViewColumn.Order" data-throw-if-not-resolved="false"></xref> property, allowing for a consistent display order of the columns.
  example: []
  syntax:
    content: IList<TableViewColumn> VisibleColumns { get; }
    parameters: []
    return:
      type: System.Collections.Generic.IList{WinUI.TableView.TableViewColumn}
    content.vb: ReadOnly Property VisibleColumns As IList(Of TableViewColumn)
  overload: WinUI.TableView.ITableViewColumnsCollection.VisibleColumns*

  source:
    id: ColumnPropertyChanged
    path: E:\copilot-worktrees\WinUI.TableView\w-ahmad-curly-disco\src\ITableViewColumnsCollection.cs
    startLine: 22
  assemblies:
  - WinUI.TableView
  namespace: WinUI.TableView
  summary: Occurs when a property of a column changes.
  remarks: >-
    This event is triggered to notify subscribers about changes to column properties, such as width, visibility, or other attributes.

    Handlers can use the <xref href="WinUI.TableView.TableViewColumnPropertyChangedEventArgs" data-throw-if-not-resolved="false"></xref> parameter to access details about the specific property that changed.
  example: []
  syntax:
    content: event EventHandler<TableViewColumnPropertyChangedEventArgs>? ColumnPropertyChanged
    return:
      type: System.EventHandler{WinUI.TableView.TableViewColumnPropertyChangedEventArgs}
    content.vb: Event ColumnPropertyChanged As EventHandler(Of TableViewColumnPropertyChangedEventArgs)
